entity: Post
parameters: {}
items:
  post{1..20}:
    title: '{{lorem.sentence}}'
    description: '{{lorem.paragraphs}}'
    estimatedTime: '{{number.int(5,30)}} minutes'
    thumbnailUrl: '{{image.url}}'
    postType: '{{helpers.arrayElement(["IMAGE", "VIDEO", "YOUTUBE_URL"])}}'
    postDifficulty: '{{helpers.arrayElement(["EASY", "MEDIUM", "HARD"])}}'
    viewCount: '{{number.int(0,1000)}}'
    completionCount: '{{number.int(0,500)}}'
    likeCount: '{{number.int(0,200)}}'
    user: '@user*' 